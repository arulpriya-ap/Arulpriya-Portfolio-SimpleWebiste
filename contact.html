<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="icon" href="Copyright Image.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <div class="container">
        <div class="section-one">
            <h1 class="section-one__name">Arulpriya Govindaraj</h1>

            <a class="section-one__contact" href="/Users/arulpriya/Desktop/FSWD/CSS/Portfolio/index.html" title="Go to home page">Home</a>

        <div class="contact-form">
            <form>

                <table>
                    <tr>
                        <td>Name:</td>
                        <td>
                            <input type="text" placeholder="Enter Your Name" class="contact-form__input">
                        </td>
                    </tr>

                    <tr>
                        <td>Email:</td>
                        <td>
                            <input type="text" placeholder="Enter Your Email" class="contact-form__input">
                        </td>
                    </tr>

                    <tr>
                        <td>Message:</td>
                        <td>
                            <textarea rows="5" cols="30" placeholder="Enter your Message" class="contact-form__message"></textarea>
                        </td>
                    </tr>

                    <tr>
                        <td></td>
                        <td style="padding:11px;">
                            <input type="submit" value="Submit" style="margin-left: -10px;" class="contact-form__submitbtn">
                        </td>
                    </tr>
                </table>
                <div class="section-five">
                    <p class="section-five__title">Social Media:
                        <a href="https://www.instagram.com/accounts/login/?hl=en" target="_blank">
                            <image src="instagram-vector-logo-icon-social-media-logotype_901408-392.avif" width="20"
                                height="20px"></image> Instagram
                        </a>,
                        <a href="https://www.linkedin.com/feed/" target="_blank">
                             LinkedIn
                        </a>
                    </p>

                    <p class="section-five__desc">&copy; Arulpriya Govindaraj</p>
                </div>
            </form>
        </div>
</body>
